name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test with coverage
        run: |
          go test ./... -coverprofile=coverage.out
          (
            cd cmd/gin-ninja-cli
            go test ./... -coverprofile=coverage-cli.out
          )
          (
            cd examples/full/browsertests
            go test ./...
          )
          {
            echo 'mode: set'
            tail -n +2 coverage.out
            tail -n +2 cmd/gin-ninja-cli/coverage-cli.out
          } > coverage-all.out

      - name: Install DeepSource CLI
        run: curl -fsSL https://cli.deepsource.com/install | BINDIR=./bin sh

      - name: Upload coverage to DeepSource
        run: ./bin/deepsource report --analyzer test-coverage --key go --value-file ./coverage-all.out
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}

      - name: Build
        run: |
          go build ./...
          (
            cd cmd/gin-ninja-cli
            go build ./...
          )

  postgres-migration-integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gin_ninja
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gin_ninja"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run PostgreSQL migration integration tests
        env:
          GIN_NINJA_TEST_POSTGRES_DRIVER: postgresql
          GIN_NINJA_TEST_POSTGRES_HOST: 127.0.0.1
          GIN_NINJA_TEST_POSTGRES_PORT: "5432"
          GIN_NINJA_TEST_POSTGRES_USER: postgres
          GIN_NINJA_TEST_POSTGRES_PASSWORD: postgres
          GIN_NINJA_TEST_POSTGRES_DB: gin_ninja
          GIN_NINJA_TEST_POSTGRES_SSLMODE: disable
          GIN_NINJA_TEST_POSTGRES_TIME_ZONE: UTC
        run: |
          cd cmd/gin-ninja-cli
          go test ./... -run '^TestRunMigrationCommandsHandleMultiStepSchemaEvolutionPostgres$' -count=1

  mysql-migration-integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: gin_ninja
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run MySQL migration integration tests
        env:
          GIN_NINJA_TEST_MYSQL_DRIVER: mysql
          GIN_NINJA_TEST_MYSQL_HOST: 127.0.0.1
          GIN_NINJA_TEST_MYSQL_PORT: "3306"
          GIN_NINJA_TEST_MYSQL_USER: root
          GIN_NINJA_TEST_MYSQL_PASSWORD: root
          GIN_NINJA_TEST_MYSQL_DB: gin_ninja
          GIN_NINJA_TEST_MYSQL_CHARSET: utf8mb4
          GIN_NINJA_TEST_MYSQL_LOC: UTC
        run: |
          cd cmd/gin-ninja-cli
          go test ./... -run '^TestRunMigrationCommandsHandleMultiStepSchemaEvolutionMySQL$' -count=1
