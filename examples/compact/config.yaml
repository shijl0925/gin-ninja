app:
  name: "Gin Ninja Compact Example"
  env: "development"
  debug: true
  version: "1.0.0"

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 60
  write_timeout: 60

database:
  driver: "sqlite"
  dsn: "compact_example.db"
  max_idle_conns: 5
  max_open_conns: 10

redis:
  enabled: false
  addr: "127.0.0.1:6379"
  username: ""
  password: ""
  db: 0
  prefix: "gin-ninja:compact:"

jwt:
  secret: "change-me-in-production-please"
  expire_hours: 24
  issuer: "gin-ninja-compact"

log:
  level: "info"
  format: "console"
  output: "stdout"
  max_size_mb: 100
  max_age_days: 7
  max_backups: 3
  compress: false
