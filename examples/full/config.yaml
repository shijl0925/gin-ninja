app:
  name: "Gin Ninja Full Example"
  env: "development"
  debug: true
  version: "1.0.0"

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 60
  write_timeout: 60

database:
  driver: "sqlite"
  dsn: "full_example.db"
  # 切换到 MySQL:
  # driver: "mysql"
  # dsn: "root:p%40ss%3Aword@tcp(127.0.0.1:3306)/gin_ninja?charset=utf8mb4&parseTime=True&loc=Local"
  # mysql:
  #   host: "${DB_HOST:127.0.0.1}"
  #   port: 3306
  #   user: "${DB_USER:root}"
  #   password: "${DB_PASSWORD}"          # 从环境变量读取，避免明文
  #   name: "gin_ninja"
  #   charset: "utf8mb4"
  #   parse_time: true
  #   loc: "Local"
  # Raw DSN passwords should be URL-encoded first if they contain reserved characters like @ : / ? # +.
  # Structured mysql/postgres fields are assembled by the framework and do not need manual encoding.
  #
  # 切换到 PostgreSQL:
  # driver: "postgres"
  # dsn: "${DATASOURCE_URL:host=127.0.0.1 user=postgres password=postgres dbname=gin_ninja port=5432 sslmode=disable}"
  # postgres:
  #   host:     "${DB_HOST:127.0.0.1}"
  #   port:     5432
  #   user:     "${DB_USER:postgres}"
  #   password: "${DB_PASSWORD}"          # 从环境变量读取，避免明文
  #   name:     "gin_ninja"
  #   sslmode:  "disable"
  #   time_zone: "Asia/Shanghai"
  max_idle_conns: 5
  max_open_conns: 10

redis:
  enabled: false
  addr: "127.0.0.1:6379"
  username: ""
  password: "${REDIS_PASSWORD}"          # 从环境变量读取，避免明文；未设置则为空
  db: 0
  prefix: "gin-ninja:example:"
  # 启用后，/api/v1/examples/cache 会优先使用 Redis 作为响应缓存后端。

jwt:
  secret: "${JWT_SECRET:change-me-in-production-please}"   # 生产环境请通过环境变量注入
  expire_hours: 24
  issuer: "gin-ninja-example"

log:
  level: "info"
  format: "console"
  output: "stdout"        # 改成文件路径即可启用文件日志，如 "logs/app.log"
  max_size_mb: 100        # 单文件上限，默认 100MB
  max_age_days: 7         # 旧日志保留天数，默认 7 天
  max_backups: 3          # 保留旧日志份数，默认 3 份
  compress: false         # 是否压缩旧日志
