app:
  name: "Gin Ninja Full Example"
  env: "development"
  debug: true
  version: "1.0.0"

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 60
  write_timeout: 60

database:
  driver: "sqlite"
  dsn: "examples/full/full_example.db"
  # 切换到 MySQL:
  # driver: "mysql"
  # dsn: "root:password@tcp(127.0.0.1:3306)/gin_ninja?charset=utf8mb4&parseTime=True&loc=Local"
  #
  # 切换到 PostgreSQL:
  # driver: "postgres"
  # dsn: "host=127.0.0.1 user=postgres password=postgres dbname=gin_ninja port=5432 sslmode=disable TimeZone=Asia/Shanghai"
  max_idle_conns: 5
  max_open_conns: 10

jwt:
  secret: "change-me-in-production-please"
  expire_hours: 24
  issuer: "gin-ninja-example"

log:
  level: "info"
  format: "console"
  output: "stdout"
