app:
  name: "Gin Ninja Full Example"
  env: "development"
  debug: true
  version: "1.0.0"

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 60
  write_timeout: 60

database:
  driver: "sqlite"
  dsn: "examples/full/full_example.db"
  max_idle_conns: 5
  max_open_conns: 10

jwt:
  secret: "change-me-in-production-please"
  expire_hours: 24
  issuer: "gin-ninja-example"

log:
  level: "info"
  format: "console"
  output: "stdout"
