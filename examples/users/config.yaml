app:
  name: "Gin Ninja Users Example"
  env: "development"
  debug: true
  version: "1.0.0"

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 60
  write_timeout: 60

database:
  driver: "sqlite"
  dsn: "users_example.db"
  max_idle_conns: 5
  max_open_conns: 10

redis:
  enabled: false
  addr: "127.0.0.1:6379"
  username: ""
  password: ""
  db: 0
  prefix: "gin-ninja:users:"

jwt:
  secret: "change-me-in-production-please"
  expire_hours: 24
  issuer: "gin-ninja-users-example"

log:
  level: "info"
  format: "console"
  output: "stdout"        # 改成文件路径即可启用文件日志，如 "logs/app.log"
  max_size_mb: 100        # 单文件上限，默认 100MB
  max_age_days: 7         # 旧日志保留天数，默认 7 天
  max_backups: 3          # 保留旧日志份数，默认 3 份
  compress: false         # 是否压缩旧日志
